<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OIDC Authentication Server</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #0f172a;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        max-width: 700px;
        padding: 40px;
      }

      .badge {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 999px;
        background: #1d4ed8;
        font-size: 0.85rem;
        font-weight: 600;
        margin-bottom: 24px;
      }

      h1 {
        font-size: 3.4rem;
        font-weight: 800;
        margin-bottom: 16px;
        line-height: 1.1;
      }

      h1 span {
        color: #60a5fa;
      }

      p {
        font-size: 1.1rem;
        color: #cbd5e1;
        margin-bottom: 40px;
      }

      .btn {
        display: inline-block;
        padding: 15px 28px;
        background: #2563eb;
        color: #fff;
        text-decoration: none;
        border-radius: 12px;
        font-weight: 600;
        transition: 0.2s;
      }

      .btn:hover {
        background: #1d4ed8;
        transform: translateY(-2px);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge">OIDC Identity Provider</div>

      <h1>Secure <span>Authentication</span><br />Made Simple.</h1>

      <p>OpenID Connect & OAuth 2.0 Authorization Server</p>

      <a class="btn" href="/.well-known/openid-configuration">
        Service Discovery
      </a>
    </div>
  </body>
</html>
