<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap");

      :root {
        --primary: #6366f1;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e0e7ff 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #1e2937;
      }

      .login-container {
        width: 100%;
        max-width: 420px;
        background: white;
        border-radius: 20px;
        box-shadow:
          0 20px 25px -5px rgb(0 0 0 / 0.1),
          0 8px 10px -6px rgb(0 0 0 / 0.1);
        overflow: hidden;
      }

      .login-header {
        padding: 40px 40px 30px;
        text-align: center;
        border-bottom: 1px solid #f1f5f9;
      }

      .login-header h1 {
        font-size: 28px;
        font-weight: 600;
        color: #1e2937;
        margin-bottom: 8px;
      }

      .login-header p {
        color: #64748b;
        font-size: 15px;
      }

      .login-form {
        padding: 40px;
      }

      .form-group {
        margin-bottom: 24px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 500;
        color: #475569;
      }

      .input-wrapper {
        position: relative;
      }

      input {
        width: 100%;
        padding: 14px 16px;
        border: 2px solid #e2e8f0;
        border-radius: 12px;
        font-size: 16px;
        transition: all 0.3s ease;
        outline: none;
      }

      input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
      }

      .password-toggle {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #64748b;
        cursor: pointer;
        font-size: 18px;
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 28px;
        font-size: 14px;
      }

      .remember {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .remember input[type="checkbox"] {
        width: 18px;
        height: 18px;
        accent-color: var(--primary);
      }

      .forgot {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
      }

      .forgot:hover {
        text-decoration: underline;
      }

      .login-btn {
        width: 100%;
        padding: 14px;
        background: var(--primary);
        color: white;
        border: none;
        border-radius: 12px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 24px;
      }

      .login-btn:hover {
        background: #4f46e5;
        transform: translateY(-2px);
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 16px;
        margin: 24px 0;
        color: #94a3b8;
        font-size: 14px;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e2e8f0;
      }

      .signup-link {
        text-align: center;
        font-size: 15px;
        color: #64748b;
      }

      .signup-link a {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
      }

      .signup-link a:hover {
        text-decoration: underline;
      }

      /* Responsive */
      @media (max-width: 480px) {
        .login-container {
          border-radius: 16px;
        }

        .login-header,
        .login-form {
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <!-- Header -->
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Sign in to continue to your account</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="email">Email address</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
            <button type="button" class="password-toggle" id="togglePassword">
              👁️
            </button>
          </div>
        </div>

        <button type="submit" class="login-btn">Sign In</button>

        <div class="divider">or</div>

        <div class="signup-link">
          Don't have an account?
          <a href="/signup">Sign up</a>
        </div>
      </form>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const redirect_uri = params.get("redirect_uri");
      const client_id = params.get("client_id");
      let signUpLink =  document.querySelector('a')

      signUpLink.href = `/signup?client_id=${client_id}&redirect_uri=${redirect_uri}`
      
      // Password visibility toggle
      const togglePassword = document.getElementById("togglePassword");
      const passwordInput = document.getElementById("password");

      togglePassword.addEventListener("click", () => {
        const type =
          passwordInput.getAttribute("type") === "password"
            ? "text"
            : "password";
        passwordInput.setAttribute("type", type);

        togglePassword.textContent = type === "password" ? "👁️" : "🙈";
      });

      // Form submission (demo)
      const form = document.getElementById("loginForm");
      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          let rawResponse = await fetch("/authorize", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ email, password, redirect_uri, client_id }),
          });
          const { data } = await rawResponse.json();

          if (!rawResponse.ok) {
            console.log("Something went wrong ..");
            return;
          } else {
            window.location.replace(`${redirect_uri}/?code=${data.code}`);
          }
        } catch (error) {
          console.error(error);
        }
      });
    </script>
  </body>
</html>
