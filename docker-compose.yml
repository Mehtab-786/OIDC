services:
  postgres:
    image: postgres:17
    
    restart: unless-stopped

    container_name: oidc-db
    
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: oidc_auth

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: